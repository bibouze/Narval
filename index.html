<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Narval V1 | L'avenir de l'infrastructure</title>
    <style>
        :root {
            --bg-dark: #030712;
            --color-primary: #00E5FF;
            --color-secondary: #3B82F6;
            --text-main: #ffffff;
            --text-muted: #9ca3af;
            --glass-bg: rgba(17, 24, 39, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --gradient-btn: linear-gradient(135deg, #3B82F6 0%, #00E5FF 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
            line-height: 1.6;
        }

        .ambient-glow {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -1;
            opacity: 0.5;
            pointer-events: none;
            animation: pulseGlow 8s infinite alternate;
        }

        .glow-1 {
            top: -10%; left: -10%;
            width: 50vw; height: 50vw;
            background: rgba(59, 130, 246, 0.4);
        }

        .glow-2 {
            bottom: 10%; right: -10%;
            width: 60vw; height: 60vw;
            background: rgba(0, 229, 255, 0.25);
        }

        @keyframes pulseGlow {
            0% { transform: scale(1) translate(0, 0); opacity: 0.3; }
            100% { transform: scale(1.1) translate(5%, 5%); opacity: 0.6; }
        }

        nav {
            position: fixed;
            top: 0; width: 100%;
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(3, 7, 18, 0.8);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
            z-index: 1000;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 900;
            color: #fff;
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        h1, h2, h3 { font-weight: 800; letter-spacing: -1px; }

        .btn {
            background: var(--gradient-btn);
            color: #fff;
            padding: 12px 28px;
            border: none;
            border-radius: 30px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.2s, box-shadow 0.2s;
            display: inline-block;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 229, 255, 0.4);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--color-primary);
            color: var(--color-primary);
        }

        header {
            padding: 15rem 5% 8rem;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .intro-text {
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--color-primary);
            margin-bottom: 1rem;
        }

        header h1 {
            font-size: 5rem;
            line-height: 1;
            margin-bottom: 1.5rem;
            background: linear-gradient(to bottom, #ffffff, #9ca3af);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header h1 span {
            color: var(--color-primary);
            -webkit-text-fill-color: initial;
        }

        .hero-sub {
            font-size: 1.2rem;
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto 3rem;
        }

        .section-title-center {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 3rem;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 2rem;
            padding: 0 5% 5rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .product-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            backdrop-filter: blur(10px);
            transition: transform 0.3s;
        }

        .product-card:hover { transform: scale(1.02); }

        .product-banner {
            height: 200px;
            border-radius: 15px;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .banner-ac { background: radial-gradient(circle at center, #1e3a8a 0%, #0f172a 100%); }
        .banner-music { background: radial-gradient(circle at center, #064e3b 0%, #022c22 100%); }

        .banner-text {
            font-size: 4rem;
            font-weight: 900;
            background: linear-gradient(to right, #60a5fa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0.8;
        }

        .tag-soon {
            position: absolute;
            bottom: 15px; right: 15px;
            background: #f59e0
